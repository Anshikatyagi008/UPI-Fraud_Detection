<!DOCTYPE html>
<html>
<head>
    <title>Advanced Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin:0; font-family:'Segoe UI'; background: #020617; color:white; }
        .navbar { background:#0f172a; padding:15px 25px; display:flex; justify-content:space-between; border-bottom:1px solid #1e293b; }
        .nav-links a { margin-left:20px; color:#94a3b8; text-decoration:none; }
        .container { padding:25px; display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
        .chart-card { background:#1e293b; padding:20px; border-radius:12px; height: 350px; }
        h3 { margin-top:0; color:#38bdf8; }
        canvas { width:100% !important; height:280px !important; }
    </style>
</head>
<body onload="loadMetrics()">

<div class="navbar">
    <h2>📊 Model Performance</h2>
    <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <div class="chart-card">
        <h3>Receiver Operating Characteristic (ROC)</h3>
        <canvas id="rocChart"></canvas>
    </div>
    <div class="chart-card">
        <h3>Confusion Matrix (Detection Accuracy)</h3>
        <canvas id="cmChart"></canvas>
    </div>
    <div class="chart-card" style="grid-column: span 2;">
        <h3>Live Network Heartbeat</h3>
        <canvas id="netChart"></canvas>
    </div>
</div>

<script>
async function loadMetrics() {
    const res = await fetch('/metrics');
    const d = await res.json();

    // ROC Chart - Blue Line
    new Chart(document.getElementById('rocChart'), {
        type: 'line',
        data: {
            labels: d.fpr,
            datasets: [{
                label: 'Model Sensitivity',
                data: d.tpr,
                borderColor: '#38bdf8',
                backgroundColor: 'rgba(56, 189, 248, 0.2)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { maintainAspectRatio: false }
    });

    // Confusion Matrix - Colored Bars
    new Chart(document.getElementById('cmChart'), {
        type: 'bar',
        data: {
            labels: ['True Neg', 'False Pos', 'False Neg', 'True Pos'],
            datasets: [{
                data: [d.cm[0][0], d.cm[0][1], d.cm[1][0], d.cm[1][1]],
                backgroundColor: ['#22c55e', '#ef4444', '#f59e0b', '#3b82f6']
            }]
        },
        options: { plugins: { legend: { display: false } }, maintainAspectRatio: false }
    });

    // Pulse Chart
    const pulseData = Array.from({length: 20}, () => Math.random());
    new Chart(document.getElementById('netChart'), {
        type: 'line',
        data: {
            labels: pulseData.map((_, i) => i),
            datasets: [{
                data: pulseData,
                borderColor: '#a855f7',
                borderWidth: 2,
                pointRadius: 0,
                fill: false
            }]
        },
        options: { 
            scales: { y: { display: false }, x: { display: false } },
            plugins: { legend: { display: false } },
            maintainAspectRatio: false 
        }
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection AI</title>
    <style>
        body { margin:0; font-family:'Segoe UI', sans-serif; background: #020617; color:white; }
        .navbar { background:#0f172a; padding:15px 25px; display:flex; justify-content:space-between; border-bottom:1px solid #1e293b; }
        .nav-links a { margin-left:20px; color:#94a3b8; text-decoration:none; font-weight: 500; }
        .nav-links a:hover { color:#38bdf8; }
        
        .container { padding:25px; max-width: 1200px; margin: auto; }
        .cards { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:30px; }
        .card { background:#1e293b; padding:20px; border-radius:12px; border: 1px solid #334155; text-align:center; }
        .card h3 { margin:0; color:#94a3b8; font-size:14px; text-transform:uppercase; }
        .card span { font-size:28px; font-weight:bold; color:#38bdf8; }

        .main-content { display:grid; grid-template-columns: 1fr 1fr; gap:30px; }
        .panel { background:#1e293b; padding:25px; border-radius:12px; }
        
        input, select { width:100%; padding:10px; margin:8px 0 15px; background:#020617; border:1px solid #334155; color:white; border-radius:5px; box-sizing:border-box; }
        button { width:100%; padding:14px; background:#3b82f6; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:5px; }
        button:hover { background:#2563eb; }

        .result-area { padding:20px; border-radius:10px; background:#0f172a; border-left: 6px solid #475569; min-height: 100px; }
        .status-fraud { border-color:#ef4444; background: #450a0a; }
        .status-suspicious { border-color:#f59e0b; background: #451a03; }
        .status-safe { border-color:#22c55e; background: #064e3b; }
    </style>
</head>
<body>

<div class="navbar">
    <h2 style="color:#38bdf8; margin:0;">🛡️ Sentinel AI</h2>
    <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/transactions">Transactions</a>
        <a href="/analytics">Analytics</a>
        <a href="/logout" style="color:#ef4444;">Logout</a>
    </div>
</div>

<div class="container">
    <div class="cards">
        <div class="card"><h3>Total Scanned</h3><span id="txCount">0</span></div>
        <div class="card"><h3>Threats Blocked</h3><span id="threatCount">0</span></div>
        <div class="card"><h3>System Status</h3><span style="color:#22c55e">ACTIVE</span></div>
    </div>

    <div class="main-content">
        <div class="panel">
            <h3>New Transaction Scan</h3>
            <form id="fraudForm">
                <label>Transaction Amount (₹)</label>
                <input type="number" id="amount" placeholder="e.g. 5000" required>
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Date</label><input type="date" id="date" required></div>
                    <div style="flex:1"><label>Time</label><input type="time" id="time" required></div>
                </div>

                <label>Current Location</label>
                <input type="text" id="location" placeholder="City Name">
                
                <label>Usual Location</label>
                <input type="text" id="usual_location" placeholder="Home City">

                <label>Device</label>
                <input type="text" id="device" placeholder="Device Signature">

                <label>Usual Device</label>
                <select id="usual_device">
                <option value="mobile">Mobile</option>
                <option value="desktop">Desktop</option>
                <option value="laptop">Laptop</option>
                <option value="tablet">Tablet</option>
                </select>

                <label>Email</label>
                <input type="text" id="email" placeholder="example@mail.com">

                <label>ProductCD</label>
                <input type="text" id="productcd" placeholder="W / C / R">

                <label>Address</label>
                <input type="text" id="address" placeholder="Street / Area">

                <label>Distance (km)</label>
                <input type="number" id="distance" placeholder="Distance from home">

                <label>Card4</label>
                <select id="card4">
                <option value="visa">Visa</option>
                <option value="discover">Discover</option>
                <option value="mastercard">MasterCard</option>
                <option value="american express">American Express</option>
                </select>

                <label>Card6</label>
                <select id="card6">
                <option value="debit">Debit</option>
                <option value="credit">Credit</option>
                <option value=""prepaid>Prepaid</option>
                </select>

                <button type="submit">Check Fraud</button>
            </form>
        </div>

        <div id="resultBox" class="result-area">
            <h3 style="margin-top:0">Scan Result</h3>
            <div id="resDetails">Waiting for transaction data...</div>
        </div>
    </div>
</div>

<script>
    // Set current date/time
    const now = new Date();
    const dateInput = document.getElementById('date');
    dateInput.value = now.toISOString().split('T')[0];
    dateInput.max = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);

    let tx = 0, threats = 0;

    document.getElementById('fraudForm').onsubmit = async (e) => {
        e.preventDefault();

        // 1. POPUP VALIDATION (Catch wrong info early)
        const amount = document.getElementById('amount').value;
        const email = document.getElementById('email').value;
        const distance = document.getElementById('distance').value;
        const location = document.getElementById('location').value;

        if (amount <= 0) {
            alert("❌ Invalid Amount: Transaction cannot be zero or negative.");
            return;
        }
        if (!email.includes("@") || email.length < 5) {
            alert("❌ Invalid Email: Please enter a valid email address.");
            return;
        }
        if (location.toLowerCase() === "mars" || location.toLowerCase() === "test") {
            alert("⚠️ Suspicious Entry: Please provide a valid physical location.");
            return;
        }

        // 2. PREPARE DATA
        const payload = {
            amount: amount,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            location: location,
            usual_location: document.getElementById('usual_location').value,
            device: document.getElementById('device').value,
            usual_device: document.getElementById('usual_device').value,
            email: email,
            productcd: document.getElementById('productcd').value,
            address: document.getElementById('address').value,
            distance: distance,
            card4: document.getElementById('card4').value,
            card6: document.getElementById('card6').value
        };

        // 3. CALL SERVER
        const response = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        if(data.error) {
            alert("⚠️ " + data.error);
            return;
        }

        // 4. UPDATE UI
        tx++;
        document.getElementById('txCount').innerText = tx;
        
        document.getElementById('resDetails').innerHTML = `
            <h1 style="margin:0">${data.prediction}</h1>
            <p>Risk Score: ${(data.confidence * 100).toFixed(1)}%</p>
            <p>Reason: ${data.reason}</p>
            <p>Timestamp: ${data.time}</p>
        `;

        if(data.status === "fraud") {
            threats++;
            document.getElementById('threatCount').innerText = threats;
            alert("🚨 SECURITY ALERT: High-Risk Fraud detected!");
        } 
        
        // 5. OTP LOGIC
        if(data.otp_required === true) {
            // Added data.otp to the prompt text so you can test it easily!
            const userOtp = prompt("🔐 VERIFICATION REQUIRED\nYour code is: " + data.otp + "\n\nEnter code to authorize:");
            
            if(userOtp === null) {
                // User clicked cancel
                return;
            }

            if(String(userOtp) === String(data.otp)) {
                alert("✅ Verification Successful. Transaction Authorized.");
            } else {
                alert("❌ Denied: Incorrect OTP. Transaction terminated.");
                document.getElementById('resDetails').innerHTML = "<h1>BLOCKED</h1><p>Identity verification failed.</p>";   
            }    
        }
    };
</script>
</body>
</html>

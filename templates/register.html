<!DOCTYPE html>
<html>
<head>
    <title>Register - Sentinel AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CARD */
        .container {
            width: 360px;
            padding: 35px 30px;

            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;

            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #22c55e;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 11px;
            margin: 8px 0 18px;

            background: #020617;
            border: 1px solid #334155;
            border-radius: 6px;

            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 5px #22c55e;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;

            background: #22c55e;
            border: none;
            border-radius: 6px;

            color: white;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
            transform: scale(1.02);
        }

        /* LINK */
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .link a {
            color: #38bdf8;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* ERROR */
        .error {
            background: #450a0a;
            color: #fca5a5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🛡️ Create Account</h2>

    <!-- Optional Error -->
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- YOUR FORM (UNCHANGED) -->
    <form method="POST">
        <input name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Register</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
